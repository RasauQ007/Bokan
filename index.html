<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap');
  
  :root { 
    --gold: #c4a661; 
    --dark: #050505; 
    /* Luxury Iridescent Palette */
    --beige-glow: #1a1814; /* Deep Bronze/Beige */
    --champagne: #2a261f;  /* Lighter highlight */
  }

  body { 
    /* This creates the upward fade from a luxury beige to black */
    background: linear-gradient(
      0deg, 
      #1c1914 0%,    /* Bottom: Deep Muted Beige */
      #13110e 20%,   /* Subtle transition */
      #050505 50%,   /* Mid-point: Back to Black */
      #050505 100%
    );
    background-attachment: fixed; /* Keeps the gradient stable while scrolling */
    color: #a3a3a3; 
    font-family: 'Inter', sans-serif; 
    margin: 0; 
    overflow-x: hidden; 
  }

  /* Optional: Add a subtle iridescent shimmer overlay */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 100%, rgba(196, 166, 97, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Ensure the rest of your classes remain the same... */
  .font-luxury { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.2em; }
  .gold-accent { color: var(--gold); }
  .arch-line { background: linear-gradient(90deg, transparent, rgba(196,166,97,0.3), transparent); height: 1px; width: 100%; }
  .img-container { position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); background: #111; aspect-ratio: 16/10; }
  .img-glow { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) brightness(0.4); transition: 1.5s ease; transform: scale(1.1); }
  .card-group:hover .img-glow { filter: grayscale(0%) brightness(1); transform: scale(1); }
  
  .modal-scroll {
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch;
    max-height: 85vh;
  }
  [x-cloak] { display: none !important; }
</style>
