<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap');
  body { background-color: #050505; color: #a3a3a3; font-family: 'Inter', sans-serif; margin: 0; }
  .font-luxury { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.2em; }
  .gold-accent { color: #c4a661; }
  .img-container { position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); background: #111; aspect-ratio: 16/10; }
  .img-glow { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) brightness(0.4); transition: 1s; }
  .card-group:hover .img-glow { filter: grayscale(0%) brightness(1); transform: scale(1.05); }
  [x-cloak] { display: none !important; }
</style>

<div class="min-h-screen pb-64" x-data="{ 
    open: false, activeContent: {},
    content: {
        staff: { title: '11 FOH Staff', table: [{el:'L37', dt:'4 Staff'},{el:'L38', dt:'4 Staff'},{el:'L39', dt:'3 Staff'}] },
        rev_loss: { title: 'Revenue Delta', table: [{el:'Loss', dt:'-£42k vs PY'}] },
        kitchen: { title: '1 Kitchen', table: [{el:'Ops', dt:'Unified Production'}] },
        b37: { title: 'Bokan 37 Fine Dining', cap: '50/100 ppl', rev: '£43.2k/mo', table: [{el:'Check', dt:'£80'}] },
        open: { title: 'The Open Case', cap: '38/152 ppl', rev: '£49.7k/mo', table: [{el:'Vibe', dt:'Amber/Social'}] },
        bar38: { title: 'Bokan 38 Bar', cap: '90/630 ppl', rev: '£23.12k/mo', table: [{el:'Offer', dt:'Cocktails'}] },
        aviary: { title: 'The Aviary', cap: '52/260 ppl', rev: '£87.4k/mo', table: [{el:'Type', dt:'Exec Lunch'}] },
        club: { title: 'Highland Club', cap: '42/168 ppl', rev: '£120.3k/mo', table: [{el:'Style', dt:'Speakeasy'}] },
        dj: { title: '39 Terrace', cap: 'Standing', rev: '£46.2k/mo', table: [{el:'Energy', dt:'Saxo/Beats'}] }
    }
}">

  <header class="relative h-[80vh] flex flex-col items-center justify-center text-center overflow-hidden">
    <img src="pot.png" class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale">
    <div class="relative z-10">
      <h1 class="font-luxury text-6xl text-white mb-8">Our Potential</h1>
      <div class="flex gap-12 justify-center">
        <div @click="open=true; activeContent=content.staff" class="cursor-pointer px-4"><p class="gold-accent text-xs">STAFF</p><p class="text-4xl font-luxury text-white">11</p></div>
        <div @click="open=true; activeContent=content.rev_loss" class="cursor-pointer px-4"><p class="text-red-500 text-xs">LOSS</p><p class="text-4xl font-luxury text-white text-red-500">42k</p></div>
        <div @click="open=true; activeContent=content.kitchen" class="cursor-pointer px-4"><p class="gold-accent text-xs">KITCHEN</p><p class="text-4xl font-luxury text-white">01</p></div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 mt-20 space-y-32">
    <div class="grid md:grid-cols-2 gap-12">
        <div class="card-group cursor-pointer" @click="open=true; activeContent=content.open">
            <div class="img-container"><img src="open.png" class="img-glow"></div>
            <p class="font-luxury mt-4 text-white italic">The Open Case</p>
        </div>
        <div class="card-group cursor-pointer" @click="open=true; activeContent=content.b37">
            <div class="img-container"><img src="B37.png" class="img-glow"></div>
            <p class="font-luxury mt-4 text-white italic">Fine Dining</p>
        </div>
    </div>
    <div class="grid md:grid-cols-2 gap-12">
        <div class="card-group cursor-pointer" @click="open=true; activeContent=content.bar38">
            <div class="img-container"><img src="38bar.png" class="img-glow"></div>
            <p class="font-luxury mt-4 text-white italic">Panoramic Bar</p>
        </div>
        <div class="card-group cursor-pointer" @click="open=true; activeContent=content.aviary">
            <div class="img-container"><img src="Aviary.png" class="img-glow"></div>
            <p class="font-luxury mt-4 text-white italic">The Aviary</p>
        </div>
    </div>
    <div class="grid md:grid-cols-2 gap-12">
        <div class="card-group cursor-pointer" @click="open=true; activeContent=content.club">
            <div class="img-container"><img src="Club.png" class="img-glow"></div>
            <p class="font-luxury mt-4 text-white italic">Highland Club</p>
        </div>
        <div class="card-group cursor-pointer" @click="open=true; activeContent=content.dj">
            <div class="img-container"><img src="saxo.png" class="img-glow"></div>
            <p class="font-luxury mt-4 text-white italic">Terrace Sessions</p>
        </div>
    </div>
  </main>

  <div x-show="open" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="open = false"></div>
    <div class="relative bg-zinc-950 border border-white/10 w-full max-w-lg p-8">
      <h2 class="font-luxury text-2xl gold-accent mb-6" x-text="activeContent.title"></h2>
      <div class="grid grid-cols-2 gap-4 mb-6" x-show="activeContent.rev">
          <div class="bg-white/5 p-3 text-center"><p class="text-[8px] text-gray-500">CAP</p><p class="text-white text-xs" x-text="activeContent.cap"></p></div>
          <div class="bg-white/5 p-3 text-center"><p class="text-[8px] text-gray-500">REV</p><p class="gold-accent text-xs font-bold" x-text="activeContent.rev"></p></div>
      </div>
      <div class="space-y-4">
        <template x-for="row in activeContent.table">
          <div class="flex justify-between border-b border-white/5 pb-2">
            <span class="text-[10px] text-gray-500 uppercase" x-text="row.el"></span>
            <span class="text-xs text-white" x-text="row.dt"></span>
          </div>
        </template>
      </div>
      <button @click="open = false" class="mt-8 text-[10px] gold-accent uppercase tracking-widest">Close</button>
    </div>
  </div>
</div>
